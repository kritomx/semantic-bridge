"""
Link between two activities (predecessor - activity, successor successorObject)
"""
type Successor {
  """Activity defines the predeccessor for the Successor definition."""
  activity: Activity

  """Activity that is the successor for this succession link"""
  successorObject: [Activity]

  """
  Type of succession link. (Start-Start, Start-Finish, Finish-Start, Finish-Finish).
  """
  type: SuccessorType!

  """Calendar used for the succession link."""
  calendar: Calendar

  """Duration in hours for the lag of the succession link."""
  lagHours: Float!
  activityId: Int!
  successorObjectId: Int
  calendarId: Int
  successorForReportSuccessors: [ReportSuccessor]
  originalBaselineSuccessorForReportSuccessors: [ReportSuccessor]
  baselineSuccessorForReportSuccessors: [ReportSuccessor]
  currentForReportSuccessors: [ReportSuccessor]
  ilapId: String
  baseUri: String
  id: Int!
  created: DateTime!
}

