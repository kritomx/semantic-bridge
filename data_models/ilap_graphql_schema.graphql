"""Top level node in the Ilap hierarchy"""
type Data {
  """
  Profile that is represented as percentage of total amount of Resource used against percentage of total duration of an Activity
  """
  profiles: [Profile]

  """
  Project included in this Ilap hierarchy. Exactly one project exists within an Ilap hiearchy
  """
  schedules(where: ScheduleFilterInput): [Schedule!]!

  """Calendar defining working and non-working time and dates"""
  calendars: [Calendar]

  """Physical objects or Staff available to use as resource for activities"""
  resources: [Resource]
  status: ImportStatus!
  tenantId: Int!
  ilapFileId: Int!
  metadataFields: [MetadataField]
  structures: [Structure]
  tenant: Tenant
  ilapFile: IlapFile
  planningSoftware: String
  label: String
  localSystemId: String
  globalSystemId: String
  code: String
  ilapId: String
  baseUri: String
  id: Int!
  created: DateTime!
}

"""The schedule included in this Ilap hierarchy."""
type Schedule {
  """Activities that are part of the schedule."""
  activities(where: ActivityFilterInput): [Activity]
  dataId: Int!
  description: String
  completedDate: DateTime
  startedDate: DateTime
  currentProgress: Float!
  cutoffDate: DateTime
  activitiesCount: Int!
  totalHours: Float!
  actualHours: Float!
  earnedHours: Float!
  transferMetadata: TransferMetadata
  data: Data
  baselineRevisions: [ReportBaselineRevision]
  liveRevisions: [ReportLiveRevision]
  scheduleForOriginalBaselineRevisions: [ReportSchedule]
  scheduleForBaselineRevisions: [ReportSchedule]
  scheduleForCurrentRevisions: [ReportSchedule]
  scheduleForReportingSchedules: [ReportSchedule]
  scheduleMetadataFieldValues: [ScheduleMetadataFieldValue]
  scheduleForOriginalBaselineRevisionArchives: [ReportScheduleArchive]
  scheduleForBaselineRevisionArchives: [ReportScheduleArchive]
  scheduleForCurrentRevisionArchives: [ReportScheduleArchive]
  scheduleForReportingScheduleArchives: [ReportScheduleArchive]
  metadataFieldValues: [MetadataFieldValue]
  label: String
  localSystemId: String
  globalSystemId: String
  code: String
  ilapId: String
  baseUri: String
  id: Int!
  created: DateTime!

  """
  The contract Id or Purchase Order that the schedule relates to. Typically an N digit code
  """
  OG_Proj_ContractId: Any

  """
  The name of the project that the schedule relates to. Example: Breidablikk
  """
  OG_Proj_ProjectName: Any

  """The name of the country according to ISO 3166"""
  Country: Any

  """The oil field the the schedule is related to. Example: Grane"""
  OG_Proj_FieldName: Any

  """The name of the company that issued the schedule. Examples: Wood"""
  OG_Proj_OriginatorCompany: Any

  """The code of the project that the schedule relates to. Example: 1234"""
  OG_Proj_ProjectCode: Any
}

