"""Calendar defining working and non-working time and dates."""
type Calendar {
  """Activities that are using this calendar."""
  activities: [Activity]

  """
  Relationship between Calendar, and a working period in time that is added or removed from the calendar
  """
  calendarOperations: [CalendarOperation]

  """
  Resource assignments (Resources used by an Activity in the schedule) that are using this calendar.
  """
  resourceAssignments: [ResourceAssignment]

  """Resources that are using this calendar to determine availability."""
  resourceAvailabilities: [ResourceAvailability]

  """Successor (links between activities) that are using this calendar."""
  successors: [Successor]
  dataId: Int!
  hoursPerDay: Float!
  start: DateTime!
  finish: DateTime!
  description: String
  data: Data
  calendarForReportCalendars: [ReportCalendar]
  originalBaselineCalendarForReportCalendars: [ReportCalendar]
  baselineCalendarForReportCalendars: [ReportCalendar]
  currentForReportCalendars: [ReportCalendar]
  label: String
  localSystemId: String
  globalSystemId: String
  code: String
  ilapId: String
  baseUri: String
  id: Int!
  created: DateTime!
}

"""Calendar defining working and non-working time and dates."""
type CalendarOperation {
  """
  AddWorkingTime - Adds the defined periods of time as working time for the calendar. RemoveWorkingTime - Removes the defined periods of time as working time for the calendar
  """
  type: OperationType!

  """
  Connected period in time with definite beginning and end that is to be added or removed as working time.
  """
  connectedPeriods: [ConnectedPeriod]

  """
  Weekly repeating period in time that is to be added or removed as working time.
  """
  weeklyRepeatingPeriods: [WeeklyRepeatingPeriod]
  calendarId: Int!
  calendar: Calendar
  id: Int!
  created: DateTime!
}

